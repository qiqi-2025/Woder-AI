name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to Aliyun OSS
        uses: fangbinwei/aliyun-oss-website-action@v1
        with:
          accessKeyId: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          bucket: ${{ secrets.ALIYUN_OSS_BUCKET }}
          endpoint: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          folder: ./out
          skipSetting: true

      - name: Fix OSS object metadata
        run: |
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil config -e "https://${{ secrets.ALIYUN_OSS_ENDPOINT }}" -i "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" -k "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" -L CH
          ossutil set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/index.html" --update content-type:"text/html; charset=utf-8" content-disposition:inline -f
          ossutil set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/404.html" --update content-type:"text/html; charset=utf-8" content-disposition:inline -f
          ossutil set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/index.txt" --update content-type:"text/plain; charset=utf-8" content-disposition:inline -f || true
          ossutil set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" --include "*.css" --update content-type:"text/css; charset=utf-8" content-disposition:inline -r -f
          ossutil set-meta "oss://${{ secrets.ALIYUN_OSS_BUCKET }}/" --include "*.js" --update content-type:"application/javascript; charset=utf-8" content-disposition:inline -r -f
