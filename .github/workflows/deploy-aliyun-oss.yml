name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Install OSS upload dependencies
        run: npm install ali-oss mime-types --no-save

      - name: Deploy to Aliyun OSS
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')
          const OSS = require('ali-oss')
          const mime = require('mime-types')

          const outDir = path.resolve('out')
          const endpoint = process.env.ALIYUN_OSS_ENDPOINT
          const region = endpoint.replace('.aliyuncs.com', '')

          const client = new OSS({
            region,
            endpoint: `https://${endpoint}`,
            accessKeyId: process.env.ALIYUN_ACCESS_KEY_ID,
            accessKeySecret: process.env.ALIYUN_ACCESS_KEY_SECRET,
            bucket: process.env.ALIYUN_OSS_BUCKET,
          })

          function walk(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(directory, entry.name)
              return entry.isDirectory() ? walk(fullPath) : [fullPath]
            })
          }

          function contentTypeFor(filePath) {
            const ext = path.extname(filePath).toLowerCase()
            if (ext === '.html') return 'text/html; charset=utf-8'
            if (ext === '.txt') return 'text/plain; charset=utf-8'
            if (ext === '.css') return 'text/css; charset=utf-8'
            if (ext === '.js') return 'application/javascript; charset=utf-8'
            return mime.lookup(filePath) || 'application/octet-stream'
          }

          async function main() {
            const files = walk(outDir)

            for (const filePath of files) {
              const objectKey = path.relative(outDir, filePath).split(path.sep).join('/')
              const contentType = contentTypeFor(filePath)
              const cacheControl = objectKey.startsWith('_next/static/')
                ? 'public, max-age=31536000, immutable'
                : 'public, max-age=300'

              await client.put(objectKey, filePath, {
                headers: {
                  'Content-Type': contentType,
                  'Content-Disposition': 'inline',
                  'Cache-Control': cacheControl,
                },
              })

              console.log(`uploaded ${objectKey} (${contentType})`)
            }
          }

          main().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          NODE
